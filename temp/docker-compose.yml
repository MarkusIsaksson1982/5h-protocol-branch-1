version: '3.9'

services:
  rust-core:
    build: ./implementation/rust-core
    depends_on:
      python-proxy:
        condition: service_healthy
    environment:
      - RUST_LOG=info
      - PROXY_URL=http://python-proxy:8000
    command: cargo run --example full_flow
    volumes:
      - ./spec:/spec:ro
    networks:
      - fiveh

  python-proxy:
    build: ./implementation/python-proxy
    ports:
      - "8000:8000"
    environment:
      - PROXY_DID=did:5h:proxy-branch2-ref
      - PROXY_MODEL_ID=claude-sonnet-4-20250514
      - RECEIPT_STORE_DIR=/tmp/5h_receipts
      - RECEIPT_MODE=full_chain
      - SWEEP_INTERVAL=60
      # NEW: enables full semantic verification path in verification.py
      - REQUIRE_SEMANTIC_VERIFICATION=true
    command: uvicorn five_h_proxy.proxy:app --host 0.0.0.0 --port 8000
    volumes:
      - ./spec:/spec:ro
      - receipt_store:/tmp/5h_receipts
    networks:
      - fiveh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/proxy/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  receipt_store:

networks:
  fiveh:
    driver: bridge